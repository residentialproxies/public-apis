name: SEO Gate

on:
  pull_request:
    branches:
      - main
      - production
    paths:
      - "apps/frontend/**"
      - ".github/workflows/seo-gate.yml"
      - ".github/workflows/deploy-frontend.yml"
  push:
    branches:
      - main
      - production
    paths:
      - "apps/frontend/**"
      - ".github/workflows/seo-gate.yml"

concurrency:
  group: seo-gate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  seo-gate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: "9"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run frontend SEO gate
        run: pnpm --filter @api-navigator/frontend seo:gate

      - name: Run frontend typecheck
        run: pnpm --filter @api-navigator/frontend typecheck
