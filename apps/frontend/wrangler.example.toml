# =============================================================================
# Cloudflare Workers Configuration for API Navigator Frontend
# =============================================================================
# Copy this file to wrangler.toml and fill in actual values
#
# Prerequisites:
#   1. Set environment variable: export CLOUDFLARE_ACCOUNT_ID=your_account_id
#
# Note: No R2 bucket or KV namespace required for frontend deployment.
#       Frontend uses dummy cache (live SSR). Only the backend
#       SCREENSHOT_BUCKET R2 binding remains in use.
#
# For CI/CD: Configure GitHub Secrets (see DEPLOYMENT.md)
# =============================================================================

name = "api-navigator"
main = ".open-next/worker.js"
compatibility_date = "2025-12-15"
compatibility_flags = ["nodejs_compat"]

# Enable workers.dev subdomain for testing
workers_dev = true

# =============================================================================
# Worker Limits & Performance
# =============================================================================
# CPU time limit (paid plan: 50ms default, can increase)
# Uncomment for paid plans with higher limits
# [limits]
# cpu_ms = 50

# =============================================================================
# Static Assets Configuration
# =============================================================================
[assets]
directory = ".open-next/assets"
binding = "ASSETS"
# Enable HTML handling for SPA fallback
html_handling = "auto-trailing-slash"
# Serve pre-compressed assets (gzip/brotli)
serve_directly = true

# =============================================================================
# Environment Variables
# =============================================================================
[vars]
NEXT_PUBLIC_CMS_URL = "https://publicapi.expertbeacon.com"
NEXT_PUBLIC_SITE_URL = "https://public-api.org"
# Cache control
CACHE_MAX_AGE = "3600"
STALE_WHILE_REVALIDATE = "86400"

# =============================================================================
# Custom Domain Configuration (Optional)
# =============================================================================
# Uncomment and configure after domain is added to Cloudflare
# [[routes]]
# pattern = "public-api.org/*"
# custom_domain = true

# [[routes]]
# pattern = "www.public-api.org/*"
# custom_domain = true

# OpenNext cache storage is disabled in open-next.config.ts.
# No frontend R2 or KV bindings are required.

# =============================================================================
# Staging Environment
# =============================================================================
[env.staging]
name = "api-navigator-staging"
workers_dev = true

[env.staging.vars]
NEXT_PUBLIC_CMS_URL = "https://publicapi.expertbeacon.com"
NEXT_PUBLIC_SITE_URL = "https://api-navigator-staging.workers.dev"

# =============================================================================
# Production Environment (explicit)
# =============================================================================
[env.production]
name = "api-navigator"
workers_dev = false

[env.production.vars]
NEXT_PUBLIC_CMS_URL = "https://publicapi.expertbeacon.com"
NEXT_PUBLIC_SITE_URL = "https://public-api.org"

# Production custom domain
# [[env.production.routes]]
# pattern = "public-api.org/*"
# custom_domain = true
